<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<link rel="icon" href="favicon.ico"/>
<title>Admin — @robertusdanan</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet"/>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --void:    #03040a;
  --deep:    #070b16;
  --surface: #0c1120;
  --glass:   rgba(10,15,28,0.82);
  --edge:    rgba(100,150,255,0.14);
  --ice:     #a0bfff;
  --frost:   #d8e8ff;
  --mist:    #607090;
  --ghost:   #304060;
  --accent:  #4f80ff;
  --accent2: #9b72f8;
  --success: #3ecf8e;
  --danger:  #ff5a5a;
  --warn:    #f0b429;
  --ff-head: 'Sora', sans-serif;
  --ff-body: 'Inter', sans-serif;
  --ff-mono: 'JetBrains Mono', monospace;
  --ease-expo:   cubic-bezier(0.16,1,0.3,1);
  --ease-spring: cubic-bezier(0.34,1.56,0.64,1);
}

html, body {
  min-height: 100%;
  background: var(--void);
  font-family: var(--ff-body);
  color: var(--frost);
  font-size: 14px;
}

/* ── BACKGROUND ── */
.bg-grid {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(79,128,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(79,128,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}
.bg-glow {
  position: fixed; top: -200px; left: 50%; transform: translateX(-50%);
  width: 800px; height: 400px; z-index: 0; pointer-events: none;
  background: radial-gradient(ellipse, rgba(79,128,255,0.07) 0%, transparent 70%);
}

/* ── LAYOUT ── */
#app { position: relative; z-index: 1; min-height: 100vh; }

/* ══════════════════════════════════════════
   LOGIN SCREEN
══════════════════════════════════════════ */
#loginScreen {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; padding: 20px;
}
.login-card {
  width: min(380px, 100%);
  background: var(--glass);
  border: 1px solid var(--edge);
  border-radius: 8px;
  padding: 48px 36px 40px;
  backdrop-filter: blur(40px);
  box-shadow: 0 80px 180px rgba(0,0,0,0.9), 0 0 0 1px rgba(79,128,255,0.05) inset;
  animation: fadeUp .6s var(--ease-expo) both;
  position: relative; overflow: hidden;
}
.login-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), var(--accent), transparent);
  opacity: .7;
}
.login-badge {
  font-family: var(--ff-mono);
  font-size: .6rem; letter-spacing: .25em; text-transform: uppercase;
  color: var(--accent); margin-bottom: 24px; display: block;
}
.login-title {
  font-family: var(--ff-head);
  font-size: 1.8rem; font-weight: 600; color: #fff;
  letter-spacing: -.02em; margin-bottom: 8px;
}
.login-sub {
  font-size: .8rem; color: var(--mist); margin-bottom: 32px; font-weight: 300;
}

/* ── FORM ELEMENTS ── */
.field { margin-bottom: 16px; }
.field label {
  display: block;
  font-size: .68rem; font-weight: 500; letter-spacing: .1em;
  text-transform: uppercase; color: var(--mist); margin-bottom: 7px;
}
.field input, .field textarea, .field select {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(79,128,255,0.15);
  border-radius: 4px;
  padding: 10px 13px;
  color: var(--frost);
  font-family: var(--ff-body);
  font-size: .85rem;
  transition: border-color .2s, background .2s, box-shadow .2s;
  outline: none;
}
.field input:focus, .field textarea:focus, .field select:focus {
  border-color: var(--accent);
  background: rgba(79,128,255,0.07);
  box-shadow: 0 0 0 3px rgba(79,128,255,0.12);
}
.field textarea { resize: vertical; min-height: 80px; }
.field select option { background: #0c1120; }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;
  padding: 10px 18px; border-radius: 4px;
  font-family: var(--ff-mono); font-size: .68rem;
  letter-spacing: .14em; text-transform: uppercase;
  cursor: pointer; font-weight: 400;
  transition: all .2s ease; border: 1px solid transparent;
  white-space: nowrap;
}
.btn-primary {
  background: var(--accent); border-color: var(--accent); color: #fff;
}
.btn-primary:hover { background: #6b96ff; border-color: #6b96ff; box-shadow: 0 0 20px rgba(79,128,255,0.35); }
.btn-outline {
  background: transparent; border-color: rgba(79,128,255,0.3); color: var(--ice);
}
.btn-outline:hover { border-color: var(--accent); background: rgba(79,128,255,0.07); }
.btn-danger {
  background: transparent; border-color: rgba(255,90,90,0.3); color: #ff8080;
}
.btn-danger:hover { border-color: var(--danger); background: rgba(255,90,90,0.08); }
.btn-success {
  background: var(--success); border-color: var(--success); color: #001a0d;
}
.btn-success:hover { background: #4fdda0; box-shadow: 0 0 20px rgba(62,207,142,0.3); }
.btn-sm { padding: 7px 13px; font-size: .62rem; }
.btn-full { width: 100%; }
.btn:disabled { opacity: .45; cursor: not-allowed; }

/* ══════════════════════════════════════════
   MAIN LAYOUT
══════════════════════════════════════════ */
#mainScreen { display: none; min-height: 100vh; }

/* ── TOPBAR ── */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: 16px;
  padding: 0 28px; height: 56px;
  background: rgba(3,4,10,0.92);
  border-bottom: 1px solid var(--edge);
  backdrop-filter: blur(24px);
}
.topbar-brand {
  font-family: var(--ff-mono);
  font-size: .65rem; letter-spacing: .2em; text-transform: uppercase;
  color: var(--accent); display: flex; align-items: center; gap: 8px;
}
.topbar-brand-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent2);
  box-shadow: 0 0 8px var(--accent2);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.topbar-sep { flex: 1; }
.topbar-user {
  font-size: .75rem; color: var(--mist);
  display: flex; align-items: center; gap: 10px;
}
.topbar-user strong { color: var(--ice); font-weight: 500; }

/* ── TABS ── */
.tabs {
  display: flex; gap: 2px;
  padding: 20px 28px 0;
  border-bottom: 1px solid var(--edge);
}
.tab {
  padding: 10px 20px;
  font-family: var(--ff-mono); font-size: .65rem;
  letter-spacing: .15em; text-transform: uppercase;
  color: var(--mist); cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color .2s, border-color .2s;
  margin-bottom: -1px;
}
.tab:hover { color: var(--ice); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── CONTENT ── */
.content { padding: 28px; max-width: 900px; }

/* ── SECTION HEADER ── */
.section-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
}
.section-title {
  font-family: var(--ff-head);
  font-size: 1.1rem; font-weight: 600; color: #fff;
}
.section-sub {
  font-size: .75rem; color: var(--mist); margin-top: 3px; font-weight: 300;
}

/* ── GLASS PANEL ── */
.panel {
  background: var(--glass);
  border: 1px solid var(--edge);
  border-radius: 6px;
  overflow: hidden;
}
.panel-body { padding: 24px; }

/* ── AVATAR PREVIEW ── */
.avatar-row {
  display: flex; align-items: center; gap: 20px; margin-bottom: 20px;
  padding: 16px;
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--edge);
  border-radius: 6px;
}
.avatar-preview {
  width: 72px; height: 72px; border-radius: 50%;
  background: linear-gradient(145deg,#0f1a30,#1a2540);
  border: 2px solid rgba(79,128,255,0.25);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; flex-shrink: 0;
}
.avatar-preview img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.avatar-initials {
  font-family: var(--ff-head); font-size: 20px; font-weight: 500;
  color: var(--ice); letter-spacing: 2px;
}
.avatar-info { flex: 1; }
.avatar-info p { font-size: .75rem; color: var(--mist); margin-bottom: 8px; font-weight: 300; }

/* ── LINK CARDS TABLE ── */
.link-list { display: flex; flex-direction: column; gap: 0; }
.link-item {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 20px;
  border-bottom: 1px solid rgba(79,128,255,0.07);
  transition: background .2s;
}
.link-item:last-child { border-bottom: none; }
.link-item:hover { background: rgba(79,128,255,0.03); }
.link-drag {
  color: var(--ghost); cursor: grab; font-size: 16px;
  padding: 4px; user-select: none; flex-shrink: 0;
}
.link-drag:active { cursor: grabbing; }
.link-icon-preview {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--edge);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; overflow: hidden;
}
.link-icon-preview img { width: 22px; height: 22px; object-fit: contain; }
.link-info { flex: 1; min-width: 0; }
.link-label {
  font-size: .82rem; font-weight: 500; color: var(--frost);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.link-url {
  font-family: var(--ff-mono); font-size: .62rem;
  color: var(--mist); margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.link-actions { display: flex; gap: 6px; flex-shrink: 0; }

.badge {
  display: inline-flex; align-items: center;
  padding: 3px 8px; border-radius: 3px;
  font-family: var(--ff-mono); font-size: .58rem;
  letter-spacing: .1em; text-transform: uppercase;
}
.badge-active { background: rgba(62,207,142,0.12); color: var(--success); border: 1px solid rgba(62,207,142,0.2); }
.badge-inactive { background: rgba(255,90,90,0.1); color: #ff8080; border: 1px solid rgba(255,90,90,0.2); }

/* ── MODAL / DRAWER ── */
.overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(3,4,10,0.88);
  backdrop-filter: blur(20px);
  display: flex; align-items: center; justify-content: center; padding: 20px;
  opacity: 0; pointer-events: none;
  transition: opacity .3s ease;
}
.overlay.open { opacity: 1; pointer-events: auto; }
.modal {
  width: min(520px,100%);
  background: rgba(7,11,22,0.98);
  border: 1px solid var(--edge);
  border-radius: 8px;
  max-height: 90vh; overflow-y: auto;
  transform: translateY(24px) scale(.97);
  transition: transform .4s var(--ease-spring);
  position: relative;
}
.overlay.open .modal { transform: none; }
.modal::before {
  content: '';
  position: sticky; top: 0; left: 0; right: 0; height: 1px; display: block;
  background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), var(--accent), transparent);
  opacity: .7;
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 24px 16px; border-bottom: 1px solid var(--edge);
}
.modal-title { font-family: var(--ff-head); font-size: 1rem; font-weight: 600; color: #fff; }
.modal-close {
  width: 32px; height: 32px; border-radius: 50%;
  background: transparent; border: 1px solid var(--ghost);
  color: var(--mist); cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}
.modal-close:hover { border-color: var(--danger); color: #ff8080; }
.modal-body { padding: 24px; }
.modal-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--edge);
  display: flex; gap: 10px; justify-content: flex-end;
}

/* ── TOAST ── */
.toast-container {
  position: fixed; bottom: 24px; right: 24px; z-index: 999;
  display: flex; flex-direction: column; gap: 10px; pointer-events: none;
}
.toast {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 18px; border-radius: 6px;
  font-size: .8rem; font-weight: 400;
  backdrop-filter: blur(20px);
  animation: toastIn .35s var(--ease-expo) both;
  pointer-events: auto;
}
@keyframes toastIn { from{opacity:0;transform:translateX(24px)} to{opacity:1;transform:none} }
.toast-success { background: rgba(62,207,142,0.12); border: 1px solid rgba(62,207,142,0.25); color: var(--success); }
.toast-error   { background: rgba(255,90,90,0.12);  border: 1px solid rgba(255,90,90,0.25);  color: #ff8080; }
.toast-info    { background: rgba(79,128,255,0.12);  border: 1px solid rgba(79,128,255,0.25);  color: var(--ice); }

/* ── EMPTY STATE ── */
.empty {
  text-align: center; padding: 48px 24px;
  color: var(--mist); font-size: .82rem; font-weight: 300;
}
.empty-icon { font-size: 2rem; margin-bottom: 12px; opacity: .4; }

/* ── SPINNER ── */
.spinner {
  width: 20px; height: 20px; border-radius: 50%;
  border: 2px solid rgba(79,128,255,0.2);
  border-top-color: var(--accent);
  animation: spin .7s linear infinite; flex-shrink: 0;
}
@keyframes spin { to{transform:rotate(360deg)} }

.loading-row {
  display: flex; align-items: center; justify-content: center; gap: 12px;
  padding: 32px; color: var(--mist); font-size: .8rem;
}

/* ── TOGGLE ── */
.toggle-wrap { display: flex; align-items: center; gap: 10px; }
.toggle {
  width: 40px; height: 22px; border-radius: 11px;
  background: var(--ghost); border: none; cursor: pointer;
  position: relative; transition: background .2s; flex-shrink: 0;
}
.toggle::after {
  content: '';
  position: absolute; top: 3px; left: 3px;
  width: 16px; height: 16px; border-radius: 50%;
  background: #fff; transition: transform .2s var(--ease-spring);
}
.toggle.on { background: var(--success); }
.toggle.on::after { transform: translateX(18px); }
.toggle-label { font-size: .8rem; color: var(--ice); }

/* ── ICON UPLOAD ── */
.icon-upload-area {
  border: 2px dashed rgba(79,128,255,0.2);
  border-radius: 6px; padding: 20px;
  text-align: center; cursor: pointer;
  transition: border-color .2s, background .2s;
}
.icon-upload-area:hover {
  border-color: var(--accent);
  background: rgba(79,128,255,0.04);
}
.icon-upload-area p { font-size: .75rem; color: var(--mist); margin-top: 8px; }
.icon-preview-wrap {
  display: flex; align-items: center; gap: 12px; margin-top: 12px;
}
.icon-preview-box {
  width: 48px; height: 48px; border-radius: 8px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--edge);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.icon-preview-box img { width: 34px; height: 34px; object-fit: contain; }

/* ── DIVIDER ── */
.divider-line {
  height: 1px; background: var(--edge); margin: 20px 0;
}

/* ── SORT ORDER HINT ── */
.order-badge {
  font-family: var(--ff-mono); font-size: .6rem;
  color: var(--ghost); background: rgba(255,255,255,0.03);
  border: 1px solid var(--edge); border-radius: 3px;
  padding: 2px 7px; flex-shrink: 0;
}

/* ANIMATIONS */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: none; }
}
.fade-in { animation: fadeUp .4s var(--ease-expo) both; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--ghost); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--mist); }

/* RESPONSIVE */
@media (max-width: 600px) {
  .topbar { padding: 0 16px; }
  .tabs { padding: 16px 16px 0; overflow-x: auto; }
  .content { padding: 16px; }
  .modal-body { padding: 16px; }
  .modal-footer { flex-direction: column; }
  .link-item { padding: 12px 14px; }
}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div id="app">

  <!-- ══ LOGIN ══ -->
  <div id="loginScreen">
    <div class="login-card">
      <span class="login-badge">⬡ Admin Panel</span>
      <h1 class="login-title">Masuk</h1>
      <p class="login-sub">Kelola profil dan link dari satu tempat.</p>

      <div class="field">
        <label>Username</label>
        <input type="text" id="loginUser" placeholder="username" autocomplete="username"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <div id="loginErr" style="color:var(--danger);font-size:.75rem;margin-bottom:14px;display:none;"></div>
      <button class="btn btn-primary btn-full" id="loginBtn" onclick="doLogin()">
        Masuk
      </button>
    </div>
  </div>

  <!-- ══ MAIN ══ -->
  <div id="mainScreen">
    <div class="topbar">
      <div class="topbar-brand">
        <span class="topbar-brand-dot"></span>
        Admin Panel
      </div>
      <div class="topbar-sep"></div>
      <div class="topbar-user">
        Halo, <strong id="topbarUser">—</strong>
        <button class="btn btn-outline btn-sm" onclick="doLogout()">Keluar</button>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('profile', this)">Profil</div>
      <div class="tab" onclick="switchTab('links', this)">Link Cards</div>
    </div>

    <!-- TAB: PROFILE -->
    <div id="tabProfile" class="content fade-in">
      <div class="section-head">
        <div>
          <div class="section-title">Profil</div>
          <div class="section-sub">Nama, handle, tagline, dan foto profil.</div>
        </div>
        <button class="btn btn-success" onclick="saveProfile()">Simpan Profil</button>
      </div>

      <div class="panel">
        <div class="panel-body" id="profilePanel">
          <div class="loading-row"><div class="spinner"></div> Memuat data…</div>
        </div>
      </div>
    </div>

    <!-- TAB: LINKS -->
    <div id="tabLinks" class="content fade-in" style="display:none;">
      <div class="section-head">
        <div>
          <div class="section-title">Link Cards</div>
          <div class="section-sub">Drag untuk mengubah urutan tampil.</div>
        </div>
        <button class="btn btn-primary" onclick="openLinkModal(null)">+ Tambah Link</button>
      </div>

      <div class="panel">
        <div id="linkListWrap">
          <div class="loading-row"><div class="spinner"></div> Memuat data…</div>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- ══ MODAL EDIT LINK ══ -->
<div class="overlay" id="linkOverlay" onclick="bgClose(event)">
  <div class="modal" id="linkModal">
    <div class="modal-header">
      <div class="modal-title" id="linkModalTitle">Tambah Link</div>
      <button class="modal-close" onclick="closeLinkModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="fId"/>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
        <div class="field">
          <label>Label *</label>
          <input type="text" id="fLabel" placeholder="cth: Instagram"/>
        </div>
        <div class="field">
          <label>Sub-label</label>
          <input type="text" id="fSub" placeholder="cth: @username"/>
        </div>
      </div>

      <div class="field">
        <label>URL *</label>
        <input type="url" id="fUrl" placeholder="https://"/>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
        <div class="field">
          <label>Domain (tampil di modal)</label>
          <input type="text" id="fDomain" placeholder="cth: instagram.com/user"/>
        </div>
        <div class="field">
          <label>Teks Tombol</label>
          <input type="text" id="fBtn" placeholder="Buka Halaman"/>
        </div>
      </div>

      <div class="field">
        <label>Deskripsi (tampil di modal)</label>
        <textarea id="fDesc" placeholder="Deskripsi singkat…"></textarea>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
        <div class="field">
          <label>Tipe Ikon</label>
          <select id="fIconType" onchange="onIconTypeChange()">
            <option value="instagram">Instagram</option>
            <option value="github">GitHub</option>
            <option value="saweria">Saweria</option>
            <option value="custom">Custom (upload)</option>
          </select>
        </div>
        <div class="field">
          <label>Urutan (sort order)</label>
          <input type="number" id="fSort" placeholder="0" min="0"/>
        </div>
      </div>

      <!-- Custom icon upload -->
      <div id="customIconSection" style="display:none;">
        <div class="divider-line"></div>
        <div class="field">
          <label>Upload Ikon (PNG/SVG, maks 100KB)</label>
          <div class="icon-upload-area" onclick="document.getElementById('fIconFile').click()">

<!-- ══════════════════════════════════════════
     LOAD CONFIG → THEN RUN APP
══════════════════════════════════════════ -->
<script>
window.__configReady = false;
window.__configCallback = null;

function __onConfigLoaded() {
  window.__configReady = true;
  if (typeof window.__configCallback === 'function') window.__configCallback();
}

(function() {
  var base = window.location.pathname.replace(/\/[^/]*$/, '/');
  function loadScript(src, ok, fail) {
    var s = document.createElement('script');
    s.src = src; s.onload = ok; s.onerror = fail;
    document.head.appendChild(s);
  }
  loadScript(base + 'config.js', __onConfigLoaded, function() {
    loadScript('/config.js', __onConfigLoaded, function() { __onConfigLoaded(); });
  });
})();
</script>

<script>
// ════════════════════════════════════════════
// GLOBALS
// ════════════════════════════════════════════
let SB_URL  = '';
let SB_ANON = '';
let SESSION_TOKEN = localStorage.getItem('admin_token') || '';
let CURRENT_USER  = '';
let iconBase64 = null;
let iconMime   = 'png';
let profileData = null;
let dragSrcIndex = null;
let linkItems = [];

// ════════════════════════════════════════════
// API HELPERS
// ════════════════════════════════════════════
async function sbFetch(path, method = 'GET', body = null, extraHeaders = {}) {
  const headers = {
    'apikey':        SB_ANON,
    'Authorization': `Bearer ${SB_ANON}`,
    'Content-Type':  'application/json',
    'Accept':        'application/json',
    ...extraHeaders,
  };
  if (SESSION_TOKEN) headers['X-Admin-Token'] = SESSION_TOKEN;

  const opts = { method, headers, signal: AbortSignal.timeout(8000) };
  if (body) opts.body = JSON.stringify(body);

  const res = await fetch(`${SB_URL}/rest/v1/${path}`, opts);
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || err.hint || `HTTP ${res.status}`);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function rpcFetch(fn, params) {
  const res = await fetch(`${SB_URL}/rest/v1/rpc/${fn}`, {
    method: 'POST',
    headers: {
      'apikey': SB_ANON,
      'Authorization': `Bearer ${SB_ANON}`,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify(params),
    signal: AbortSignal.timeout(8000),
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.message || data.hint || `HTTP ${res.status}`);
  return data;
}

// ════════════════════════════════════════════
// TOAST
// ════════════════════════════════════════════
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ════════════════════════════════════════════
// AUTH
// ════════════════════════════════════════════
async function doLogin() {
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginErr');
  const btn   = document.getElementById('loginBtn');

  if (!user || !pass) { showLoginErr('Isi username dan password.'); return; }

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="width:16px;height:16px;border-width:2px;"></div> Masuk…';
  errEl.style.display = 'none';

  try {
    // Hash password dengan SHA-256
    const hashBuf  = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pass));
    const hashHex  = Array.from(new Uint8Array(hashBuf)).map(b => b.toString(16).padStart(2,'0')).join('');

    // Cari admin_user
    const users = await sbFetch(`admin_users?username=eq.${encodeURIComponent(user)}&select=id,username,password_hash`);
    if (!users || !users.length) throw new Error('Username atau password salah.');

    const admin = users[0];
    if (admin.password_hash !== hashHex) throw new Error('Username atau password salah.');

    // Buat session
    const token = crypto.randomUUID();
    await sbFetch('admin_sessions', 'POST', {
      token,
      admin_id: admin.id,
    }, { Prefer: 'return=minimal' });

    SESSION_TOKEN = token;
    CURRENT_USER  = admin.username;
    localStorage.setItem('admin_token', token);
    enterApp();
  } catch(e) {
    showLoginErr(e.message);
    btn.disabled = false;
    btn.textContent = 'Masuk';
  }
}

function showLoginErr(msg) {
  const el = document.getElementById('loginErr');
  el.textContent = msg;
  el.style.display = 'block';
}

async function checkSession() {
  if (!SESSION_TOKEN) return false;
  try {
    const rows = await sbFetch(
      `admin_sessions?token=eq.${SESSION_TOKEN}&select=admin_id,expires_at,admin_users(username)&limit=1`
    );
    if (!rows || !rows.length) return false;
    if (new Date(rows[0].expires_at) < new Date()) {
      await sbFetch(`admin_sessions?token=eq.${SESSION_TOKEN}`, 'DELETE');
      return false;
    }
    CURRENT_USER = rows[0].admin_users?.username || '';
    return true;
  } catch { return false; }
}

async function doLogout() {
  try { await sbFetch(`admin_sessions?token=eq.${SESSION_TOKEN}`, 'DELETE'); } catch {}
  SESSION_TOKEN = '';
  localStorage.removeItem('admin_token');
  location.reload();
}

// ════════════════════════════════════════════
// APP ENTRY
// ════════════════════════════════════════════
function enterApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainScreen').style.display  = 'block';
  document.getElementById('topbarUser').textContent    = CURRENT_USER;
  loadProfile();
}

async function startApp() {
  const cfg = window.APP_CONFIG || {};
  SB_URL  = cfg.SUPABASE_URL  || '';
  SB_ANON = cfg.SUPABASE_ANON || '';

  if (!SB_URL || !SB_ANON) {
    toast('Config Supabase tidak ditemukan. Pastikan config.js sudah di-deploy.', 'error');
    return;
  }

  // Enter keyboard submit on login
  document.getElementById('loginPass').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('loginUser').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('loginPass').focus();
  });

  const valid = await checkSession();
  if (valid) {
    enterApp();
  }
  // else: login screen already visible
}

if (window.__configReady) { startApp(); }
else { window.__configCallback = startApp; }

// ════════════════════════════════════════════
// TABS
// ════════════════════════════════════════════
function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tabProfile').style.display = tab === 'profile' ? 'block' : 'none';
  document.getElementById('tabLinks').style.display   = tab === 'links'   ? 'block' : 'none';
  if (tab === 'links' && !linkItems.length) loadLinks();
}

// ════════════════════════════════════════════
// PROFILE TAB
// ════════════════════════════════════════════
async function loadProfile() {
  const panel = document.getElementById('profilePanel');
  try {
    const rows = await sbFetch('profile?select=*&limit=1');
    profileData = rows && rows[0] ? rows[0] : { id: null, name:'', handle:'', tagline:'', avatar_data: null, avatar_type:'jpeg' };
    renderProfileForm(profileData);
  } catch(e) {
    panel.innerHTML = `<div class="empty"><div class="empty-icon">⚠</div>Gagal memuat: ${e.message}</div>`;
  }
}

function renderProfileForm(d) {
  const panel = document.getElementById('profilePanel');
  const avatarSrc = d.avatar_data && d.avatar_data !== 'empty'
    ? `data:image/${d.avatar_type || 'jpeg'};base64,${d.avatar_data}`
    : null;

  panel.innerHTML = `
    <div class="avatar-row">
      <div class="avatar-preview" id="avatarPreviewEl">
        ${avatarSrc
          ? `<img src="${avatarSrc}" alt="avatar"/>`
          : `<span class="avatar-initials">${getInitials(d.name)}</span>`}
      </div>
      <div class="avatar-info">
        <p>Format: JPEG / PNG / WebP. Disimpan sebagai Base64 di Supabase.</p>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn btn-outline btn-sm" onclick="document.getElementById('avatarFileInput').click()">Ganti Foto</button>
          ${avatarSrc ? `<button class="btn btn-danger btn-sm" onclick="clearAvatar()">Hapus Foto</button>` : ''}
        </div>
        <input type="file" id="avatarFileInput" accept="image/jpeg,image/png,image/webp" style="display:none" onchange="onAvatarFile()"/>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
      <div class="field">
        <label>Nama</label>
        <input type="text" id="pName" value="${esc(d.name)}" placeholder="Nama lengkap"/>
      </div>
      <div class="field">
        <label>Handle</label>
        <input type="text" id="pHandle" value="${esc(d.handle)}" placeholder="@username"/>
      </div>
    </div>
    <div class="field">
      <label>Tagline</label>
      <input type="text" id="pTagline" value="${esc(d.tagline)}" placeholder="Creator · Developer · Dreamer"/>
    </div>
  `;
}

let newAvatarB64 = null;
let newAvatarType = null;

function onAvatarFile() {
  const file = document.getElementById('avatarFileInput').files[0];
  if (!file) return;
  if (file.size > 500 * 1024) { toast('Foto terlalu besar (maks 500KB).', 'error'); return; }

  const reader = new FileReader();
  reader.onload = e => {
    const b64 = e.target.result.split(',')[1];
    const mime = file.type.split('/')[1] || 'jpeg';
    newAvatarB64  = b64;
    newAvatarType = mime;

    // Update preview
    const prev = document.getElementById('avatarPreviewEl');
    prev.innerHTML = `<img src="data:image/${mime};base64,${b64}" alt="avatar"/>`;
    toast('Foto dipilih — klik Simpan Profil untuk menyimpan.', 'info');
  };
  reader.readAsDataURL(file);
}

function clearAvatar() {
  newAvatarB64  = 'empty';
  newAvatarType = 'jpeg';
  const prev = document.getElementById('avatarPreviewEl');
  const name  = document.getElementById('pName').value;
  prev.innerHTML = `<span class="avatar-initials">${getInitials(name)}</span>`;
}

async function saveProfile() {
  const name    = document.getElementById('pName').value.trim();
  const handle  = document.getElementById('pHandle').value.trim();
  const tagline = document.getElementById('pTagline').value.trim();

  if (!name) { toast('Nama tidak boleh kosong.', 'error'); return; }

  const payload = { name, handle, tagline };
  if (newAvatarB64 !== null) {
    payload.avatar_data = newAvatarB64;
    payload.avatar_type = newAvatarType || 'jpeg';
  }

  const btn = document.querySelector('[onclick="saveProfile()"]');
  btn.disabled = true; btn.textContent = 'Menyimpan…';

  try {
    if (profileData && profileData.id) {
      await sbFetch(`profile?id=eq.${profileData.id}`, 'PATCH', payload, { Prefer: 'return=minimal' });
    } else {
      await sbFetch('profile', 'POST', payload, { Prefer: 'return=minimal' });
    }
    toast('Profil berhasil disimpan!', 'success');
    newAvatarB64 = null;
    await loadProfile();
  } catch(e) {
    toast('Gagal menyimpan: ' + e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Simpan Profil';
  }
}

// ════════════════════════════════════════════
// LINK CARDS TAB
// ════════════════════════════════════════════
async function loadLinks() {
  const wrap = document.getElementById('linkListWrap');
  wrap.innerHTML = `<div class="loading-row"><div class="spinner"></div> Memuat…</div>`;
  try {
    const rows = await sbFetch('link_cards?select=*&order=sort_order.asc');
    linkItems = rows || [];
    renderLinks();
  } catch(e) {
    wrap.innerHTML = `<div class="empty"><div class="empty-icon">⚠</div>Gagal memuat: ${e.message}</div>`;
  }
}

function renderLinks() {
  const wrap = document.getElementById('linkListWrap');

    wrap.innerHTML = `<div class="empty"><div class="empty-icon">🔗</div>Belum ada link. Klik + Tambah Link.</div>`;
    return;
  }

  wrap.innerHTML = `<div class="link-list" id="linkList">${
    linkItems.map((lk, i) => `
      <div class="link-item" draggable="true"
           data-idx="${i}"
           ondragstart="onDragStart(event,${i})"
           ondragover="onDragOver(event)"
           ondrop="onDrop(event,${i})"
           ondragend="onDragEnd()">
        <span class="link-drag" title="Drag untuk ubah urutan">⠿</span>
        <span class="order-badge">${lk.sort_order}</span>
        <div class="link-icon-preview">
          ${iconHTML(lk)}

        <div class="link-info">

}

// ── DRAG & DROP REORDER ──
function onDragStart(e, idx) {
  dragSrcIndex = idx;
  e.dataTransfer.effectAllowed = 'move';
  e.currentTarget.style.opacity = '.4';
}
function onDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
function onDragEnd() {
  document.querySelectorAll('.link-item').forEach(el => el.style.opacity = '1');
}
function onDrop(e, targetIdx) {
  e.preventDefault();
  if (dragSrcIndex === null || dragSrcIndex === targetIdx) return;
  const moved = linkItems.splice(dragSrcIndex, 1)[0];
  linkItems.splice(targetIdx, 0, moved);
  dragSrcIndex = null;
  renderLinks();
  saveSortOrder();
}

async function saveSortOrder() {
  try {
    await Promise.all(linkItems.map((lk, i) =>
      sbFetch(`link_cards?id=eq.${lk.id}`, 'PATCH', { sort_order: i }, { Prefer: 'return=minimal' })
    ));
    linkItems.forEach((lk, i) => lk.sort_order = i);
    toast('Urutan disimpan.', 'success');
    renderLinks();
  } catch(e) {
    toast('Gagal simpan urutan: ' + e.message, 'error');
  }
}

// ── MODAL ADD/EDIT LINK ──
function openLinkModal(idx) {
  iconBase64 = null; iconMime = 'png';

  if (idx === null) {
    // New
    document.getElementById('linkModalTitle').textContent = 'Tambah Link';
    document.getElementById('fId').value      = '';
    document.getElementById('fLabel').value   = '';
    document.getElementById('fSub').value     = '';
    document.getElementById('fUrl').value     = '';
    document.getElementById('fDomain').value  = '';
    document.getElementById('fBtn').value     = 'Buka Halaman';
    document.getElementById('fDesc').value    = '';
    document.getElementById('fIconType').value = 'custom';
    document.getElementById('fSort').value    = linkItems.length;
    document.getElementById('fActive').className = 'toggle on';
  } else {
    const lk = linkItems[idx];
    document.getElementById('linkModalTitle').textContent = 'Edit Link';
    document.getElementById('fId').value      = lk.id;
    document.getElementById('fLabel').value   = lk.label;
    document.getElementById('fSub').value     = lk.sub;
    document.getElementById('fUrl').value     = lk.url;
    document.getElementById('fDomain').value  = lk.domain;
    document.getElementById('fBtn').value     = lk.btn_label;
    document.getElementById('fDesc').value    = lk.description;
    document.getElementById('fIconType').value = lk.icon_type || 'custom';
    document.getElementById('fSort').value    = lk.sort_order;
    document.getElementById('fActive').className = `toggle ${lk.is_active ? 'on' : ''}`;
  }

  onIconTypeChange();
  document.getElementById('iconPreviewWrap').style.display = 'none';
  document.getElementById('linkOverlay').classList.add('open');
}

function closeLinkModal() {
  document.getElementById('linkOverlay').classList.remove('open');
}

function bgClose(e) {
  if (e.target === document.getElementById('linkOverlay')) closeLinkModal();
}

function onIconTypeChange() {
  const type = document.getElementById('fIconType').value;
  document.getElementById('customIconSection').style.display = type === 'custom' ? 'block' : 'none';
}

function onIconFileChange() {
  const file = document.getElementById('fIconFile').files[0];
  if (!file) return;
  if (file.size > 100 * 1024) { toast('Ikon terlalu besar (maks 100KB).', 'error'); return; }

  const reader = new FileReader();
  reader.onload = e => {
    iconBase64 = e.target.result.split(',')[1];
    iconMime   = file.type.split('/')[1] || 'png';

    document.getElementById('iconPreviewImg').src = e.target.result;
    document.getElementById('iconFileName').textContent  = file.name;
    document.getElementById('iconFileSize').textContent  = (file.size / 1024).toFixed(1) + ' KB';
    document.getElementById('iconPreviewWrap').style.display = 'flex';
  };
  reader.readAsDataURL(file);
}

function clearIcon() {
  iconBase64 = null;
  document.getElementById('fIconFile').value = '';
  document.getElementById('iconPreviewWrap').style.display = 'none';
}

async function saveLink() {
  const id       = document.getElementById('fId').value;
  const label    = document.getElementById('fLabel').value.trim();
  const sub      = document.getElementById('fSub').value.trim();
  const url      = document.getElementById('fUrl').value.trim();
  const domain   = document.getElementById('fDomain').value.trim();
  const btn_label = document.getElementById('fBtn').value.trim() || 'Buka Halaman';
  const description = document.getElementById('fDesc').value.trim();
  const icon_type = document.getElementById('fIconType').value;
  const sort_order = parseInt(document.getElementById('fSort').value) || 0;
  const is_active  = document.getElementById('fActive').classList.contains('on');

  if (!label) { toast('Label tidak boleh kosong.', 'error'); return; }
  if (!url)   { toast('URL tidak boleh kosong.', 'error'); return; }

  const payload = { label, sub, url, domain, btn_label, description, icon_type, sort_order, is_active };
  if (icon_type === 'custom' && iconBase64) {
    payload.icon_data = iconBase64;
    payload.icon_mime = iconMime;
  }

  const btn = document.getElementById('saveLinkBtn');
  btn.disabled = true; btn.textContent = 'Menyimpan…';

  try {
    if (id) {
      await sbFetch(`link_cards?id=eq.${id}`, 'PATCH', payload, { Prefer: 'return=minimal' });
    } else {
      await sbFetch('link_cards', 'POST', payload, { Prefer: 'return=minimal' });
    }
    toast(id ? 'Link diperbarui!' : 'Link ditambahkan!', 'success');
    closeLinkModal();
    await loadLinks();
  } catch(e) {
    toast('Gagal menyimpan: ' + e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Simpan';
  }
}

async function deleteLink(id, idx) {
  const lk = linkItems[idx];
  if (!confirm(`Hapus link "${lk.label}"?`)) return;
  try {
    await sbFetch(`link_cards?id=eq.${id}`, 'DELETE');
    toast('Link dihapus.', 'success');
    await loadLinks();
  } catch(e) {
    toast('Gagal hapus: ' + e.message, 'error');
  }
}

// ════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════
function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function getInitials(name) {
  return (name || 'RD').split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
}
