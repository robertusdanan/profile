name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets into config.js
        run: |
          sed \
            -e "s|PLACEHOLDER_SUPABASE_URL|${{ secrets.SUPABASE_URL }}|g" \
            -e "s|PLACEHOLDER_SUPABASE_ANON|${{ secrets.SUPABASE_ANON }}|g" \
            config.template.js > config.js
          echo "=== Verifikasi config.js (nilai disensor) ==="
          grep -o 'SUPABASE_URL.*' config.js | head -c 60 || true
          echo ""
          echo "=== Cek apakah placeholder masih ada (harusnya kosong) ==="
          grep "PLACEHOLDER" config.js && echo "GAGAL: placeholder belum terganti!" || echo "OK: semua placeholder sudah terganti"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          exclude_assets: '.github'
          keep_files: false
