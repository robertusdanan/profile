name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate config.js from template
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON: ${{ secrets.SUPABASE_ANON }}
        run: |
          sed \
            -e "s|PLACEHOLDER_SUPABASE_URL|${SUPABASE_URL}|g" \
            -e "s|PLACEHOLDER_SUPABASE_ANON|${SUPABASE_ANON}|g" \
            config.template.js > config.js

          echo "✅ config.js berhasil di-generate"
          # Verifikasi placeholder sudah terganti (tanpa tampilkan nilai asli)
          if grep -q "PLACEHOLDER" config.js; then
            echo "❌ ERROR: Masih ada placeholder yang belum terganti. Cek GitHub Secrets!"
            exit 1
          fi
          echo "✅ Semua placeholder berhasil terganti"

      - name: Deploy ke branch gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          # Pastikan config.js ikut ter-deploy meskipun ada di .gitignore
          exclude_assets: '.gitignore,.git'