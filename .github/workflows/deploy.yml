name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate config.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON: ${{ secrets.SUPABASE_ANON }}
        run: |
          sed \
            -e "s|PLACEHOLDER_SUPABASE_URL|${SUPABASE_URL}|g" \
            -e "s|PLACEHOLDER_SUPABASE_ANON|${SUPABASE_ANON}|g" \
            config.template.js > config.js

          if grep -q "PLACEHOLDER" config.js; then
            echo "ERROR: Secrets belum terisi!"
            exit 1
          fi
          echo "config.js OK"

      - name: Deploy ke gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Siapkan folder deploy
          mkdir -p /tmp/deploy
          cp index.html /tmp/deploy/
          cp config.js  /tmp/deploy/
          cp favicon.ico /tmp/deploy/ 2>/dev/null || true
          cp og.jpg      /tmp/deploy/ 2>/dev/null || true

          # Push ke gh-pages
          cd /tmp/deploy
          git init
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git checkout -b gh-pages
          git add -A
          git commit -m "deploy: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git push -f origin gh-pages