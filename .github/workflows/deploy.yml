name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate config.js from template
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON: ${{ secrets.SUPABASE_ANON }}
        run: |
          sed \
            -e "s|PLACEHOLDER_SUPABASE_URL|${SUPABASE_URL}|g" \
            -e "s|PLACEHOLDER_SUPABASE_ANON|${SUPABASE_ANON}|g" \
            config.template.js > config.js

          echo "config.js berhasil di-generate"
          if grep -q "PLACEHOLDER" config.js; then
            echo "ERROR: Masih ada placeholder! Cek GitHub Secrets."
            exit 1
          fi
          echo "Semua placeholder berhasil terganti"

      - name: Deploy ke branch gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          exclude_assets: '.gitignore,.git'
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'