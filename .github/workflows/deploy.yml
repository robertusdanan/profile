name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets into config.js
        run: |
          sed \
            -e "s|PLACEHOLDER_SUPABASE_URL|${{ secrets.SUPABASE_URL }}|g" \
            -e "s|PLACEHOLDER_SUPABASE_ANON|${{ secrets.SUPABASE_ANON }}|g" \
            config.template.js > config.js

          echo "=== Cek placeholder (harusnya tidak ada output) ==="
          grep "PLACEHOLDER" config.js && echo "GAGAL: placeholder belum terganti!" || echo "OK: secrets berhasil di-inject"

          echo "=== Isi config.js ==="
          cat config.js

      - name: List files before deploy
        run: |
          echo "=== File yang akan di-deploy ==="
          ls -la

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          exclude_assets: '.github,config.template.js,README.md'
